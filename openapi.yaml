      parameters:
        - name: blob
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Blob ciphertext stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Blob not found or not owned by caller.
        "429":
          description: Rate limit exceeded.

  /gallery/raw-batch:
    post:
      tags: [Gallery]
      operationId: galleryRawBatch
      summary: Stream many gallery blobs in one response (Store v3 §10.4)
      description: >
        Owner-scoped batch fetch to cut round-trips on a cold shard/thumbnail load.
        Returns the concatenated framed ciphertext of the requested blobs (only
        those owned AND present are emitted; unknown/foreign/missing ids are
        silently skipped — 404-hiding). Wire format, per returned blob in request
        order: `[u32le idLen][id utf8][u32le dataLen][ciphertext]`. Max 512 ids.
        Throttle: 600 req/min. Never returns plaintext.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blobs]
              properties:
                blobs:
                  type: array
                  maxItems: 512
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Concatenated framed blob ciphertext.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "422":
          description: Invalid or oversized blobs array.
        "429":
          description: Rate limit exceeded.

  /gallery/blob/{blob}:
    delete:
      tags: [Gallery]
      operationId: galleryBlobDestroy
      summary: Delete a gallery blob
      description: "Idempotent. Throttle: 3000 req/min."
      parameters:
        - name: blob
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "429":
          description: Rate limit exceeded.

  /gallery/blobs/reconcile:
    post:
      tags: [Gallery]
      operationId: galleryReconcile
      summary: Reclaim unreferenced gallery blobs
      description: >
        Same orphan-reclaim protocol as files/blobs/reconcile. Throttle: 120 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blobs]
              properties:
                blobs:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 100000
      responses:
        "200":
          description: Reconciled; updated usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "429":
          description: Rate limit exceeded.

  /gallery/process:
    post:
      tags: [Gallery]
      operationId: galleryProcess
      summary: Process a photo/video to derive thumbnails and metadata (transient plaintext)
      description: >
        **Accepted transient zero-knowledge window:** the browser decrypts the
        original and POSTs plaintext bytes here. The server derives thumbnails,
        EXIF, place, CLIP embedding, face crops and returns them; the plaintext is
        discarded at request end — nothing is persisted. The client re-encrypts all
        outputs before storing them as blobs. Throttle: 600 req/min.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Plaintext photo or video bytes (decrypted by the client).
                ml:
                  type: boolean
                  default: true
                  description: >
                    If false, skip heavy ML (CLIP + face detection) — the client
                    will call /gallery/analyze later.
      responses:
        "200":
          description: Derived data to be re-encrypted and stored by the client.
          content:
            application/json:
              schema:
                type: object
                properties:
                  media_type:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer
                  duration:
                    type: number
                    nullable: true
                  content_id:
                    type: string
                    nullable: true
                  exif:
                    type: object
                    nullable: true
                  place:
                    type: string
                    nullable: true
                  embedding:
                    type: string
                    nullable: true
                    description: Base64-encoded CLIP embedding.
                  model:
                    type: string
                    nullable: true
                    description: >
                      CLIP model the embedding was produced with (server config
                      gallery.ml_clip_model). Clients tag the record's embModel
                      with this so semantic search only compares embeddings from
                      one model (spec §8.5). Native clients read it here.
                  phash:
                    type: string
                    nullable: true
                  faces:
                    type: array
                    items:
                      type: object
                  thumb:
                    type: string
                    nullable: true
                    description: Base64-encoded JPEG thumbnail.
                  medium:
                    type: string
                    nullable: true
                    description: Base64-encoded medium rendition.
                  motion:
                    type: string
                    nullable: true
                    description: Base64-encoded motion photo clip.
        "422":
          description: Image too large or invalid.
        "429":
          description: Rate limit exceeded.

  /gallery/analyze:
    post:
      tags: [Gallery]
      operationId: galleryAnalyze
      summary: Deferred ML pass — CLIP embedding and face detection only
      description: >
        Accepts a medium rendition (plaintext, discarded after). Returns only CLIP
        embedding + faces for deferred integration into the sealed metadata.
        Same transient ZK window as /gallery/process. Throttle: 600 req/min.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: ML outputs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  embedding:
                    type: string
                    nullable: true
                  model:
                    type: string
                    nullable: true
                    description: >
                      CLIP model the embedding was produced with (spec §8.5);
                      clients tag embModel with it so semantic search compares
                      only same-model embeddings. Native clients read it here.
                  faces:
                    type: array
                    items:
                      type: object
        "429":
          description: Rate limit exceeded.

  /gallery/embed-text:
    post:
      tags: [Gallery]
      operationId: galleryEmbedText
      summary: Embed a text query in CLIP space for client-side semantic search
      description: >
        Returns a CLIP text embedding for the given query string so the client can
        perform a vector similarity search in its sealed gallery index without the
        server seeing the query text. The query is discarded after embedding.
        Throttle: 300 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [q]
              properties:
                q:
                  type: string
                  maxLength: 1024
                  description: Search query in natural language.
      responses:
        "200":
          description: CLIP text embedding.
          content:
            application/json:
              schema:
                type: object
                properties:
                  embedding:
                    type: string
                    description: Base64-encoded float32 vector.
        "429":
          description: Rate limit exceeded.

  /gallery/reverse:
    get:
      tags: [Gallery]
      operationId: galleryReverse
      summary: Reverse-geocode coordinates to a place name
      description: >
        Looks up a human-readable place name for the given latitude/longitude. The
        query passes through the server only (client CSP forbids third-party calls)
        and is not persisted. Throttle: 60 req/min.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
          description: Latitude in decimal degrees.
        - name: lng
          in: query
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: Longitude in decimal degrees.
      responses:
        "200":
          description: Reverse-geocoded place.
          content:
            application/json:
              schema:
                type: object
                properties:
                  place:
                    type: string
                    nullable: true
                  address:
                    type: object
                    nullable: true
        "422":
          description: Coordinates out of range.
        "429":
          description: Rate limit exceeded.

