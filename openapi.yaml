openapi: 3.1.0
info:
  title: Ledgerline API
  version: 1.504.34
  description: >
    Zero-knowledge personal cloud API for the Ledgerline mobile client.

    **Zero-knowledge architecture:** all content payloads (ciphertext fields,
    sealed manifests, blob bodies) are opaque to the server — the server stores
    and returns ciphertext only and never reads or derives plaintext content.
    The vault key and all decryption happen exclusively in the client.

    **Authentication:** obtain a Sanctum bearer token via the device pairing
    exchange (QR code scan + owner approval in the web UI), then include it as
    `Authorization: Bearer <token>` on every request. All routes except the two
    pairing endpoints require the `device` Sanctum ability.

servers:
  - url: /api/v1
    description: Current stable API base path

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Device pairing exchange and session management
  - name: Me/Device
    description: Authenticated user info, avatar, and device heartbeat
  - name: Store
    description: >
      Opaque zero-knowledge per-module sealed stores (Store v3 split). Each module
      (notes, todos, bookmarks, contacts, invoices, passwords, health, sharing) owns
      its OWN sealed row, so a write to one module never re-seals the others. These
      modules have NO per-record REST endpoints (that would break zero-knowledge);
      their full CRUD is: read the module store (GET /store/{module}), mutate the
      decrypted object client-side, and write it back (PUT /store/{module}) with
      optimistic concurrency. The files tree has its own sharded sealed store
      (GET/PUT /files/store, tag Files). Only binary blobs (contact avatars,
      file/gallery bytes) have their own endpoints; the records that reference them
      live in these stores.
  - name: Files
    description: Personal encrypted file blobs and multipart upload pipeline
  - name: SharedFolders
    description: Member-scoped blob store for shared vault folders (blobs at shared-folders/{blob})
  - name: Gallery
    description: Gallery blobs, multipart upload, and ML processing pipeline
  - name: Contacts
    description: >
      Optional encrypted contact avatar blobs. The contact RECORDS themselves
      (names, vCard fields, etc.) live in the sealed contacts module store (see
      Store, GET/PUT /store/contacts) — these endpoints only hold the optional
      avatar image bytes a contact record references. Notes and todos are
      store-only (no blobs, no dedicated endpoints).
  - name: Explore
    description: >
      Optional encrypted Explore track blobs. The Explore RECORDS themselves
      (tracks, couplings, tolerances) live in the sealed explore module store
      (see Store, GET/PUT /store/explore, shape = ExploreStoreModel) — these
      endpoints only hold the optional raw track file bytes a record references.


      MOBILE PARITY (incl. live tracking): every Explore capability is reachable
      with the endpoints already listed — no per-record or "tracking" endpoint
      exists (that would break zero-knowledge; GPS points never reach the server
      as plaintext). The client does ALL of it and persists results into the
      sealed store:

        * Browse: read gallery photos (GET /gallery/store + /gallery/raw) for map
          pins; read tracks from GET /store/explore.
        * Import: parse GPX/KML/KMZ/TCX/FIT on-device, add a track to
          ExploreStoreModel.tracks (sourceFormat = gpx|kml|kmz|tcx|fit), PUT
          /store/explore. Optionally seal the original file via POST
          /explore/upload and store its blob id as track.rawBlobId.
        * Live tracking (mobile): record device GPS on-device, build a track with
          sourceFormat = "recorded" (points carry lat/lng/ele/t), compute stats
          client-side, PUT /store/explore. Nothing GPS-related is sent to the
          server except the sealed ciphertext.
        * Plan a tour: sourceFormat = "planned"; optionally snap waypoints to
          paths via GET /maps/route (opt-in) before saving.
        * Photo↔track coupling + tolerances: computed on-device, stored in
          ExploreStoreModel.couplings / .settings.

      Writes use the standard optimistic-concurrency PUT /store/explore
      (read → mutate the decrypted object → write with the version; 409 → re-read).
  - name: Maps
    description: >
      Explore tour-planner auto-routing. Server-side proxy to an OSRM-compatible
      router that snaps clicked waypoints onto real paths/roads. A user-initiated,
      opt-in boundary crossing (same class as gallery geocoding); coordinates are
      never logged or persisted.
  - name: Passwords
    description: Password-manager enrichment endpoints (favicon, HIBP, 2FA directory)
  - name: Vaults
    description: Shared password vault container management, ZK key wrapping, and membership lifecycle
  - name: Devices
    description: Connected device listing, revocation, and remote-wipe management
  - name: Notifications
    description: In-app notification bell — list recent items, mark read
  - name: Account
    description: GDPR data export, account deletion, and session revocation
  - name: Preferences
    description: User preferences — avatar refresh, locale, and colour-scheme

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: >
        First-party Sanctum token with ability `device`. Obtained via the
        pairing exchange. Include as `Authorization: Bearer <token>`.

  schemas:
    ExploreStoreModel:
      type: object
      description: >
        DECRYPTED shape of the `explore` module store (GET/PUT /store/explore).
        The server NEVER sees this — it stores only the sealed ciphertext in
        StoreResponse.ciphertext. This schema is the cross-client contract so the
        mobile app (and any client) reads/writes the same structure the web client
        does. Seal with the vault key using canonical JSON + Padmé + the suite
        envelope, exactly like the other module stores.
      properties:
        v:
          type: integer
          description: Schema version (currently 3).
          example: 3
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/ExploreTrack"
        couplings:
          type: object
          description: >
            Map of gallery-photo id → coupling. A photo is placed on the map by
            its own sealed EXIF lat/lng or, lacking that, by this coupling's
            interpolated position along a track.
          additionalProperties:
            $ref: "#/components/schemas/ExploreCoupling"
        settings:
          $ref: "#/components/schemas/ExploreSettings"

    ExploreTrack:
      type: object
      description: One GPS track (imported, planned, or mobile-recorded).
      required: [id, name, sourceFormat, points]
      properties:
        id:
          type: string
          description: Client-generated UUID.
        name:
          type: string
        note:
          type: string
          nullable: true
          description: Optional free-text note.
        sourceFormat:
          type: string
          description: >
            How the track originated. `recorded` = live on-device GPS recording
            (mobile); `planned` = hand-drawn/auto-routed in the planner; the rest
            are imported file formats.
          enum: [gpx, kml, kmz, tcx, fit, planned, recorded]
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
        points:
          type: array
          description: Ordered track points.
          items:
            type: object
            required: [lat, lng]
            properties:
              lat:
                type: number
              lng:
                type: number
              ele:
                type: number
                nullable: true
                description: Elevation in metres (null for planned routes).
              t:
                type: integer
                nullable: true
                description: Epoch-ms timestamp (null for planned routes).
        stats:
          type: object
          description: >
            Client-computed metrics (see shared/track-parse.js computeStats):
            distanceM, durationTotalS, durationMovingS, ascentM, descentM,
            minEleM, maxEleM, avgSpeedMps, maxSpeedMps, pointCount, and
            elevationProfile [{distM, eleM}].
        bbox:
          type: object
          nullable: true
          properties:
            minLat: { type: number }
            minLng: { type: number }
            maxLat: { type: number }
            maxLng: { type: number }
        rawBlobId:
          type: string
          nullable: true
          description: >
            Optional id of the sealed original file uploaded via POST
            /explore/upload (for later re-export). Null if not kept.
        rawBlobKey:
          type: string
          nullable: true
          description: Per-blob content key for rawBlobId (sealed in this record).
        createdAt:
          type: string
          format: date-time

    ExploreCoupling:
      type: object
      required: [trackId, source]
      properties:
        trackId:
          type: string
        source:
          type: string
          enum: [exif, interpolated, manual, none]
        lat:
          type: number
          nullable: true
          description: Interpolated position (present when source ≠ exif).
        lng:
          type: number
          nullable: true

    ExploreSettings:
      type: object
      description: Photo↔track coupling tolerances (client-side matching).
      properties:
        couplingTimeToleranceS:
          type: integer
          example: 3600
        couplingDistanceToleranceM:
          type: integer
          example: 100

    IdResponse:
      type: object
      description: Response containing the newly created resource id.
      required: [id]
      properties:
        id:
          type: string
          description: UUID of the new resource.
          example: 018f4b2e-1234-7abc-9def-000000000001

    OkResponse:
      type: object
      description: Acknowledgement response.
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    UsageResponse:
      type: object
      description: Current storage usage vs quota for the caller's scope.
      required: [used, quota]
      properties:
        used:
          type: integer
          description: Bytes currently stored.
          example: 104857600
        quota:
          type: integer
          description: Maximum bytes allowed (null = unlimited).
          nullable: true
          example: 10737418240

    StoreResponse:
      type: object
      description: Opaque sealed manifest + optimistic-concurrency version counter.
      required: [version]
      properties:
        ciphertext:
          type: string
          nullable: true
          description: >
            Opaque sealed ciphertext (XChaCha20-Poly1305, Padme-padded). The server
            never reads this value. Null on first access before any write.
        version:
          type: integer
          description: Monotone version counter used for optimistic concurrency.
          example: 42

    SharedStoreResponse:
      type: object
      description: Sealed manifest for a shared vault, with optimistic-concurrency version.
      required: [version]
      properties:
        sealed_manifest:
          type: string
          nullable: true
          description: >
            Opaque sealed ciphertext encrypted under the vault's VK_vault.
            The server never reads this value. Null before the first write.
        version:
          type: integer
          description: Monotone version counter for optimistic concurrency.
          example: 7

    VersionResponse:
      type: object
      description: New version counter returned after a successful store write.
      required: [version]
      properties:
        version:
          type: integer
          description: Updated version counter.
          example: 43

    ConflictResponse:
      type: object
      description: >
        409 Conflict — another client wrote the store concurrently. Contains
        the current server state so the caller can re-read and re-apply its changes.
      required: [version]
      properties:
        version:
          type: integer
          description: Current server-side version.
          example: 43
        ciphertext:
          type: string
          nullable: true
          description: Current sealed ciphertext (personal store conflict).
        sealed_manifest:
          type: string
          nullable: true
          description: Current sealed manifest (shared vault store conflict).

    TokenResponse:
      type: object
      description: Public share link token.
      required: [token]
      properties:
        token:
          type: string
          description: URL-safe token that identifies the share link.
          example: a1b2c3d4e5f6

    VaultResponse:
      type: object
      description: KDF parameters and wrapped vault key material for vault unlock.
      required: [configured]
      properties:
        configured:
          type: boolean
          description: Whether the caller has set up a vault.
        salt:
          type: string
          nullable: true
          description: Argon2id salt (base64). Null when not configured.
        kdf_ops:
          type: integer
          nullable: true
          description: Argon2id opslimit parameter.
          example: 4
        kdf_mem:
          type: integer
          nullable: true
          description: Argon2id memlimit parameter (bytes).
          example: 268435456
        wrapped_vault_key:
          type: string
          nullable: true
          description: >
            Opaque vault-key wrap ciphertext. Server never reads this value.
        wrap_nonce:
          type: string
          nullable: true
          description: Nonce used for the wrapped vault key (base64).
        has_recovery:
          type: boolean
          nullable: true
          description: Whether a recovery key wrap is present.
        wrapped_vault_key_recovery:
          type: string
          nullable: true
          description: >
            Optional recovery-wrap of the vault key. Opaque ciphertext.

paths:

  # --------------------------------------------------------------------------
  # Auth
  # --------------------------------------------------------------------------

  /auth/pair:
    post:
      tags: [Auth]
      operationId: authPair
      summary: Claim a pairing code (public)
      description: >
        The mobile app scans a QR code from the user's web profile and claims the
        one-time code here. Moves the pairing to pending-approval status. No bearer
        token required. Throttle: 30 req/min per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, device_name]
              properties:
                code:
                  type: string
                  description: One-time pairing code from the QR.
                device_name:
                  type: string
                  maxLength: 60
                  description: Human-readable device name shown in the web UI.
      responses:
        "200":
          description: Code claimed; waiting for owner approval.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending]
        "422":
          description: Validation error or code not found / already consumed.
        "429":
          description: Rate limit exceeded.

  /auth/pair/collect:
    post:
      tags: [Auth]
      operationId: authCollect
      summary: Poll for pairing approval (public)
      description: >
        Poll with the same code. Returns `status: pending` until the owner approves
        the device in the web UI, then returns the Sanctum bearer token exactly once.
        No bearer token required. Throttle: 30 req/min per IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: The same one-time pairing code.
                install_id:
                  type: string
                  maxLength: 64
                  description: >
                    Optional device-local random id (NOT a secret) that lets the
                    server audit trail be correlated with the client's own
                    diagnostic log. Stored on the token; echoed in device audit meta.
                app_version:
                  type: string
                  maxLength: 32
                  description: Optional client app version reported at pairing (non-secret).
                os_version:
                  type: string
                  maxLength: 32
                  description: Optional client OS version reported at pairing (non-secret).
      responses:
        "200":
          description: Pending or approved.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [pending]
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [approved]
                      token:
                        type: string
                        description: Sanctum bearer token for subsequent API calls.
                      user:
                        type: object
                        description: Basic user info payload.
        "429":
          description: Rate limit exceeded.

  /auth/session:
    delete:
      tags: [Auth]
      operationId: authDestroy
      summary: Revoke the current bearer token
      description: >
        Deletes the Sanctum token authenticating this request (logout / remote wipe
        acknowledgement). Throttle: none (uses general API throttle).
      responses:
        "200":
          description: Token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthenticated.

  # --------------------------------------------------------------------------
  # Me / Device
  # --------------------------------------------------------------------------

  /me:
    get:
      tags: [Me/Device]
      operationId: meShow
      summary: Authenticated user info and storage usage
      description: >
        Returns the authenticated user's profile, aggregate storage usage (files +
        gallery bytes), and a `wipe` flag that signals the owner has requested a
        remote wipe of this token. No throttle beyond the default API rate.
      responses:
        "200":
          description: User payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    description: >
                      User fields: id, name, email, locale, groups, has_avatar (bool).
                  usage:
                    type: object
                    properties:
                      files:
                        type: integer
                        description: Total file blob bytes.
                      gallery:
                        type: integer
                        description: Total gallery blob bytes.
                  wipe:
                    type: boolean
                    description: If true the client should erase local vault data and log out.
        "401":
          description: Unauthenticated.

  /avatar:
    get:
      tags: [Me/Device]
      operationId: avatarShow
      summary: Stream the authenticated user's avatar
      description: >
        Streams the IdP-provided avatar image for the authenticated user. Not
        zero-knowledge (IdP profile image, non-secret). Returns 404 if no avatar
        is stored. Throttle: 120 req/min.
      responses:
        "200":
          description: Avatar image bytes.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: No avatar stored.
        "429":
          description: Rate limit exceeded.

  /device/heartbeat:
    post:
      tags: [Me/Device]
      operationId: deviceHeartbeat
      summary: Record device sync activity
      description: >
        CLI/background clients call this to record whether they are currently syncing.
        Returns the remote-wipe flag so any heartbeat also delivers the kill switch.
        Throttle: 120 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: string
                  enum: [idle, syncing]
                  description: Current sync state of the client.
                detail:
                  type: string
                  maxLength: 160
                  nullable: true
                  description: Optional human-readable detail string shown in the devices list.
      responses:
        "200":
          description: Heartbeat recorded.
          content:
            application/json:
              schema:
                type: object
                required: [wipe]
                properties:
                  wipe:
                    type: boolean
                    description: >
                      If true the owner has requested a remote wipe of this token.
                      The client should erase local vault data and log out.
        "422":
          description: Validation error (state not in allowed enum).
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Vault (KDF material + wrapped vault key)
  # --------------------------------------------------------------------------

  /vault:
    get:
      tags: [Me/Device]
      operationId: vaultShow
      summary: Retrieve vault KDF parameters and wrapped vault key
      description: >
        Returns the Argon2id KDF parameters and the wrapped vault key so the
        browser can derive the KEK from the passphrase and unwrap the vault key.
        All returned values are opaque to the server. No throttle beyond default.
      responses:
        "200":
          description: Vault configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
        "401":
          description: Unauthenticated.

  # --------------------------------------------------------------------------
  # Store (personal workspace manifest)
  # --------------------------------------------------------------------------

  /store/{module}:
    parameters:
      - name: module
        in: path
        required: true
        description: >
          Module key. One of: notes, todos, bookmarks, contacts, invoices,
          passwords, health, sharing, explore. Any other value is a 404.
        schema:
          type: string
          enum: [notes, todos, bookmarks, contacts, invoices, passwords, health, sharing, explore]
    get:
      tags: [Store]
      operationId: moduleStoreShow
      summary: Read one module's sealed store
      description: >
        Store v3 per-module split: every module owns its OWN opaque sealed row, so
        a write to one module never re-seals the others. Returns the current sealed
        ciphertext and version for {module}. Mobile CRUD for a module is:
        GET /store/{module} → decrypt+mutate the object client-side →
        PUT /store/{module}. There is no per-record endpoint (zero-knowledge).
        The server never reads the ciphertext. A weak ETag (W/"{uid}-{module}-{ver}")
        supports 304. No per-route throttle beyond the default API rate.
      responses:
        "200":
          description: Current sealed module store.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "304":
          description: Not modified (ETag matched If-None-Match).
        "401":
          description: Unauthenticated.
        "404":
          description: Unknown module key.
    put:
      tags: [Store]
      operationId: moduleStoreSave
      summary: Write one module's sealed store
      description: >
        Optimistic-concurrency write for a single module. The caller sends the
        ciphertext and the version it last read; if another client wrote in the
        meantime the server returns 409 so the client can re-read, re-apply, retry.
        Throttle: 240 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ciphertext, version]
              properties:
                ciphertext:
                  type: string
                  description: >
                    Opaque sealed module ciphertext. The server stores this
                    without reading it.
                version:
                  type: integer
                  minimum: 0
                  description: Version the client last read (optimistic concurrency token).
      responses:
        "200":
          description: Write successful; new version counter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "409":
          description: Concurrent write conflict; re-read and retry.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [version_conflict]
        "404":
          description: Unknown module key.
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Files (personal encrypted blobs)
  # --------------------------------------------------------------------------

  /files/store:
    get:
      tags: [Files]
      operationId: filesStoreShow
      summary: Read the sealed files index
      description: >
        Store v3 (§4.2): Files has its OWN sharded sealed store, out of the
        monolith. The root is a small pointer table; the file/folder records live
        in content-addressed, id-bucketed shard blobs (see /files/raw + the Store
        model). Returns the current sealed root ciphertext + version. ETag/304 as
        for the other sealed stores. The server never reads the ciphertext.
      responses:
        "200":
          description: Current sealed files index root.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "304":
          description: Not modified (ETag matched If-None-Match).
        "401":
          description: Unauthenticated.
    put:
      tags: [Files]
      operationId: filesStoreSave
      summary: Write the sealed files index
      description: >
        Optimistic-concurrency write of the files index root. Same 409 protocol as
        the other sealed stores. Throttle: 120 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ciphertext, version]
              properties:
                ciphertext:
                  type: string
                  description: Opaque sealed files-index root ciphertext.
                version:
                  type: integer
                  minimum: 0
                  description: Version the client last read (optimistic concurrency token).
                shards:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: >
                    Optional referential-integrity guard. The blob refs (record shards
                    + collection blobs) the new sealed root points at. When present, the
                    server rejects the write (422 missing_shard) if any ref has no blob
                    ledger row — preventing a root that dangles at a shard whose upload
                    never durably landed (the sharded-store data-loss failure mode). The
                    refs are non-secret UUIDs, so this preserves zero-knowledge.
      responses:
        "200":
          description: Write successful; new version counter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "409":
          description: Concurrent write conflict; re-read and retry.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [version_conflict]
        "422":
          description: >
            Validation error, or `missing_shard` — the root references a blob with no
            ledger row (rejected to prevent a dangling-shard save).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [missing_shard]
        "429":
          description: Rate limit exceeded.

  /files/usage:
    get:
      tags: [Files]
      operationId: filesUsage
      summary: Personal file storage usage
      description: >
        Returns bytes used vs quota for the caller's personal file blobs.
        No per-route throttle beyond default.
      responses:
        "200":
          description: Usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "401":
          description: Unauthenticated.

  /files/upload:
    post:
      tags: [Files]
      operationId: filesUpload
      summary: Upload a single encrypted file blob
      description: >
        Stores one opaque ciphertext blob (client-encrypted). Returns the new blob
        UUID. Enforces per-user quota. Use multipart upload for files > ~100 MB.
        Throttle: 1200 req/min.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    Opaque ciphertext bytes (client-encrypted). The server stores
                    without reading.
      responses:
        "201":
          description: Blob stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "413":
          description: Quota exceeded.
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.

  /files/upload/init:
    post:
      tags: [Files]
      operationId: filesUploadInit
      summary: Initiate S3 multipart upload
      description: >
        Begins an S3 multipart upload session for a large file blob. Returns an
        opaque session token and the blob UUID to use in subsequent part/complete
        calls. Throttle: 600 req/min.
      responses:
        "200":
          description: Session initialised.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Opaque session token for subsequent part/complete/abort calls.
                  id:
                    type: string
                    description: UUID that will be registered as the blob id on completion.
        "413":
          description: Quota would be exceeded.
        "429":
          description: Rate limit exceeded.

  /files/upload/part:
    post:
      tags: [Files]
      operationId: filesUploadPart
      summary: Upload one part of a multipart upload
      description: >
        Uploads a single part (chunk) of an in-progress multipart upload session.
        Requires the opaque session token from init. Throttle: 6000 req/min.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [token, chunk]
              properties:
                token:
                  type: string
                  description: Session token from the init call.
                chunk:
                  type: string
                  format: binary
                  description: Part bytes (minimum 5 MiB per part except the last).
      responses:
        "200":
          description: Part accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  part:
                    type: integer
                    description: Part number that was recorded.
        "429":
          description: Rate limit exceeded.

  /files/upload/complete:
    post:
      tags: [Files]
      operationId: filesUploadComplete
      summary: Complete a multipart upload and register the blob
      description: >
        Finalises the S3 multipart upload and registers the blob in the ownership
        ledger. Returns the blob id (same as from init). Throttle: 600 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Session token from the init call.
      responses:
        "201":
          description: Blob registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "429":
          description: Rate limit exceeded.

  /files/upload/abort:
    post:
      tags: [Files]
      operationId: filesUploadAbort
      summary: Abort a multipart upload and clean up staged parts
      description: >
        Cancels an in-progress multipart upload and discards all uploaded parts.
        Throttle: 600 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Session token from the init call.
      responses:
        "200":
          description: Upload aborted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "429":
          description: Rate limit exceeded.

  /files/raw/{blob}:
    get:
      tags: [Files]
      operationId: filesRaw
      summary: Stream a file blob (ciphertext)
      description: >
        Streams the raw ciphertext bytes for the given blob UUID. Owner-scoped;
        foreign or missing blob returns 404 to avoid ownership oracle. Bytes are
        served with immutable cache headers — the client decrypts in memory.
        Throttle: 600 req/min.
      parameters:
        - name: blob
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Blob UUID returned by the upload endpoint.
      responses:
        "200":
          description: Blob ciphertext stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Opaque ciphertext bytes. Client decrypts with the vault key.
        "404":
          description: Blob not found or not owned by caller.
        "429":
          description: Rate limit exceeded.

  /files/raw-batch:
    post:
      tags: [Files]
      operationId: filesRawBatch
      summary: Stream many file blobs in one response (Store v3 §10.4)
      description: >
        Owner-scoped batch fetch (mirror of gallery/raw-batch) to cut round-trips on
        a cold sharded-files load. Returns the concatenated framed ciphertext of the
        requested blobs; only owned+present ids are emitted, others silently skipped.
        Wire format per blob in request order: `[u32le idLen][id utf8][u32le dataLen][ciphertext]`.
        Max 512 ids. Throttle: 600 req/min. Never returns plaintext.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blobs]
              properties:
                blobs:
                  type: array
                  maxItems: 512
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Concatenated framed blob ciphertext.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "422":
          description: Invalid or oversized blobs array.
        "429":
          description: Rate limit exceeded.

  /files/blob/{blob}:
    delete:
      tags: [Files]
      operationId: filesBlobDestroy
      summary: Delete a file blob
      description: >
        Deletes the blob bytes and its ledger row. Idempotent — a missing or
        foreign blob answers the same as a successful delete (no ownership oracle).
        Throttle: 3000 req/min.
      parameters:
        - name: blob
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted (or already absent).
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "429":
          description: Rate limit exceeded.

  /files/blobs/reconcile:
    post:
      tags: [Files]
      operationId: filesReconcile
      summary: Reclaim unreferenced file blobs
      description: >
        Client sends the set of blob UUIDs its sealed index still references. The
        server deletes any of the caller's blobs NOT in that set that are older
        than the orphan grace window (24 h). Returns updated usage. Throttle: 120 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blobs]
              properties:
                blobs:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 100000
                  description: Full list of blob UUIDs the sealed index currently references.
      responses:
        "200":
          description: Reconcile complete; updated usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "429":
          description: Rate limit exceeded.

  /files/shares:
    post:
      tags: [Files]
      operationId: filesSharesStore
      summary: Create a public share link for a file or folder
      description: >
        Creates a public share link. The `kind` field determines whether a single
        file or a folder subtree is shared. The `sealed_manifest` is an opaque
        ciphertext blob containing the re-wrapped per-file keys encrypted under the
        share link's fragment key — the server never reads it. Throttle: 60 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, sealed_manifest, blob_refs]
              properties:
                kind:
                  type: string
                  enum: [file, folder]
                  description: Whether this share covers a single file or a folder tree.
                sealed_manifest:
                  type: string
                  description: >
                    Opaque sealed share manifest (per-file keys re-wrapped under the
                    share fragment key). The server stores this without reading it.
                blob_refs:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: UUIDs of blobs included in the share (access-control list).
                allow_download:
                  type: boolean
                  default: false
                  description: Whether recipients may download the raw files.
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional expiry timestamp. Null = no expiry.
                password:
                  type: string
                  minLength: 4
                  maxLength: 200
                  nullable: true
                  description: Optional password that recipients must enter to view the share.
      responses:
        "200":
          description: Share link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.

  /files/shares/{token}:
    put:
      tags: [Files]
      operationId: filesSharesUpdate
      summary: Update an existing public share link
      description: >
        Replaces the sealed manifest, blob refs, and access settings of an existing
        share. Owner-scoped. Throttle: 60 req/min.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Share link token returned by the create endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sealed_manifest, blob_refs]
              properties:
                sealed_manifest:
                  type: string
                  description: Updated opaque sealed share manifest.
                blob_refs:
                  type: array
                  items:
                    type: string
                    format: uuid
                allow_download:
                  type: boolean
                  default: false
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                password:
                  type: string
                  minLength: 4
                  maxLength: 200
                  nullable: true
                  description: New password (omit to keep existing; use clear_password to remove).
                clear_password:
                  type: boolean
                  default: false
                  description: If true, removes the current password protection.
      responses:
        "200":
          description: Share updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "404":
          description: Share not found or not owned by caller.
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.

    delete:
      tags: [Files]
      operationId: filesSharesDestroy
      summary: Delete a public share link
      description: >
        Permanently removes the share link. Owner-scoped. Throttle: 60 req/min.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Share link token.
      responses:
        "200":
          description: Share deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Share not found or not owned by caller.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # SharedFolders (member-scoped blobs for shared vaults)
  # --------------------------------------------------------------------------

  /vaults/{vault}/blobs/usage:
    get:
      tags: [SharedFolders]
      operationId: vaultBlobsUsage
      summary: Shared folder blob storage usage
      description: >
        Returns bytes used vs quota for blobs in the shared folder vault. Quota is
        attributed to the folder owner. Requires vault membership (viewer+).
        No per-route throttle beyond default.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Shared vault UUID.
      responses:
        "200":
          description: Usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "401":
          description: Unauthenticated.
        "404":
          description: Vault not found or caller is not a member.

  /vaults/{vault}/blobs/upload:
    post:
      tags: [SharedFolders]
      operationId: vaultBlobsUpload
      summary: Upload a blob to a shared folder vault
      description: >
        Stores one opaque ciphertext blob encrypted under the vault's VK_vault.
        Requires editor+ membership. Quota is attributed to the vault owner.
        Throttle: 1200 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Opaque ciphertext bytes (client-encrypted under VK_vault).
      responses:
        "201":
          description: Blob stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "404":
          description: Vault not found or insufficient membership role.
        "413":
          description: Quota exceeded.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/upload/init:
    post:
      tags: [SharedFolders]
      operationId: vaultBlobsUploadInit
      summary: Initiate S3 multipart upload for a shared folder blob
      description: >
        Begins an S3 multipart upload session. Requires editor+ membership.
        Throttle: 600 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session initialised.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  id:
                    type: string
        "404":
          description: Vault not found or insufficient role.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/upload/part:
    post:
      tags: [SharedFolders]
      operationId: vaultBlobsUploadPart
      summary: Upload one part of a shared folder multipart upload
      description: >
        Uploads a single part of an in-progress multipart upload. Throttle: 6000 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [token, chunk]
              properties:
                token:
                  type: string
                chunk:
                  type: string
                  format: binary
      responses:
        "200":
          description: Part accepted.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/upload/complete:
    post:
      tags: [SharedFolders]
      operationId: vaultBlobsUploadComplete
      summary: Complete a shared folder multipart upload
      description: >
        Finalises the multipart upload and registers the blob. Throttle: 600 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "201":
          description: Blob registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/upload/abort:
    post:
      tags: [SharedFolders]
      operationId: vaultBlobsUploadAbort
      summary: Abort a shared folder multipart upload
      description: >
        Cancels an in-progress multipart upload and discards staged parts.
        Throttle: 600 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Aborted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/raw/{blob}:
    get:
      tags: [SharedFolders]
      operationId: vaultBlobsRaw
      summary: Stream a shared folder blob (ciphertext)
      description: >
        Streams the raw ciphertext bytes of a shared folder blob. Requires viewer+
        membership. Served with immutable cache headers. Throttle: 600 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: blob
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Blob ciphertext stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Vault or blob not found, or insufficient membership.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/{blob}:
    delete:
      tags: [SharedFolders]
      operationId: vaultBlobsDestroy
      summary: Delete a shared folder blob
      description: >
        Deletes a blob from the shared folder. Requires editor+ membership.
        Idempotent. Throttle: 3000 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: blob
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "404":
          description: Vault not found or insufficient role.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/blobs/reconcile:
    post:
      tags: [SharedFolders]
      operationId: vaultBlobsReconcile
      summary: Reclaim unreferenced blobs from a shared folder vault
      description: >
        Same orphan-reclaim protocol as the personal files reconcile. Any member
        may call this; serialised per vault owner. Throttle: 120 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blobs]
              properties:
                blobs:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 100000
      responses:
        "200":
          description: Reconciled; updated usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "404":
          description: Vault not found or not a member.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Gallery
  # --------------------------------------------------------------------------

  /gallery/store:
    get:
      tags: [Gallery]
      operationId: galleryStoreShow
      summary: Read the gallery sealed index
      description: >
        Returns the user's sealed gallery manifest (ciphertext + version).
        Same optimistic-concurrency protocol as the workspace store.
        Store v3 (§10.4): responds with a weak, version-derived `ETag`
        (`W/"{userId}-{version}"`); send it back as `If-None-Match` to get a
        bodyless 304 when the sealed root is unchanged (avoids re-transferring a
        large root on repeat opens). `Cache-Control: private, must-revalidate`.
        No per-route throttle beyond default.
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: Weak ETag from a prior read; a match yields 304.
      responses:
        "200":
          description: Sealed gallery manifest.
          headers:
            ETag:
              schema:
                type: string
              description: Weak version-derived ETag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreResponse"
        "304":
          description: Sealed root unchanged since the supplied ETag (no body).
    put:
      tags: [Gallery]
      operationId: galleryStoreSave
      summary: Write the gallery sealed index
      description: >
        Saves the sealed gallery manifest. Optimistic concurrency — see /store for
        the protocol. Throttle: 120 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ciphertext, version]
              properties:
                ciphertext:
                  type: string
                  description: Opaque sealed gallery manifest ciphertext.
                version:
                  type: integer
                  minimum: 0
                shards:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: >
                    Optional referential-integrity guard. The blob refs (record shards
                    + collection blobs) the new sealed root points at. When present, the
                    server rejects the write (422 missing_shard) if any ref has no blob
                    ledger row — preventing a root that dangles at a shard whose upload
                    never durably landed. Non-secret UUIDs; zero-knowledge preserved.
      responses:
        "200":
          description: Write successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "409":
          description: Version conflict.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [version_conflict]
        "422":
          description: >
            `missing_shard` — the root references a blob with no ledger row (rejected to
            prevent a dangling-shard save).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [missing_shard]
        "429":
          description: Rate limit exceeded.

  /gallery/usage:
    get:
      tags: [Gallery]
      operationId: galleryUsage
      summary: Gallery blob storage usage
      description: Returns bytes used vs quota for gallery blobs. No per-route throttle.
      responses:
        "200":
          description: Usage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"

  /gallery/upload:
    post:
      tags: [Gallery]
      operationId: galleryUpload
      summary: Upload a gallery blob (ciphertext)
      description: >
        Stores one opaque ciphertext gallery blob. Created_at is snapped to the
        hour to avoid upload-burst timing side-channel. Throttle: 1200 req/min.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Opaque ciphertext bytes.
      responses:
        "201":
          description: Blob stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "413":
          description: Quota exceeded.
        "429":
          description: Rate limit exceeded.

  /gallery/upload/init:
    post:
      tags: [Gallery]
      operationId: galleryUploadInit
      summary: Initiate S3 multipart upload for gallery
      description: "Throttle: 600 req/min."
      responses:
        "200":
          description: Session initialised.
          content:
            application/json:
              schema:
                type: object
                properties:
