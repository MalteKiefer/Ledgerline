                token:
                  type: string
      responses:
        "201":
          description: Blob registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "429":
          description: Rate limit exceeded.

  /gallery/upload/abort:
    post:
