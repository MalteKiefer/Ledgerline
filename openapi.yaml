  # --------------------------------------------------------------------------
  # Maps (Explore tour-planner auto-routing)
  # --------------------------------------------------------------------------

  /maps/route:
    get:
      tags: [Maps]
      operationId: mapsRoute
      summary: Snap tour waypoints to a real path/road route
      description: >
        Snaps an ordered list of clicked waypoints onto real paths/roads via a
        routing upstream and returns the snapped geometry plus total
        distance/duration. Engine-dependent (server config maps.route_engine):
        the default OSRM engine fills geometry/distanceM/durationS and leaves
        elevation/ascentM/descentM/surfaces null; a self-hosted GraphHopper engine
        additionally returns the elevation profile, ascent/descent and an OSM
        surface breakdown. User-initiated, opt-in egress (same class as
        /gallery/geocode); the client CSP forbids third-party calls so this goes
        through the server. The upstream host comes from server config, never from
        request input. Coordinates are never logged or persisted. When the
        upstream is unset/unreachable or no route exists, a clean 200 with
        geometry:null (and all other fields null) is returned so the client falls
        back to straight lines. Throttle: 60 req/min.
      parameters:
        - name: points
          in: query
          required: true
          schema:
            type: string
            maxLength: 1024
          description: >
            Ordered waypoints as "lat,lng;lat,lng;…" (2..25 points, each within
            coordinate range).
      responses:
        "200":
          description: Snapped route, or geometry:null when routing is unavailable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  geometry:
                    type: array
                    nullable: true
                    description: Ordered [lat, lng] pairs of the snapped route; null on fallback.
                    items:
                      type: array
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                  distanceM:
                    type: number
                    nullable: true
                    description: Total route distance in metres; null on fallback.
                  durationS:
                    type: number
                    nullable: true
                    description: Estimated route duration in seconds; null on fallback.
                  elevation:
                    type: array
                    nullable: true
                    description: >
                      Elevation profile: cumulative distance (metres) vs elevation
                      (metres above sea level), downsampled to ~256 points. Populated
                      only by the GraphHopper engine; null for OSRM/fallback.
                    items:
                      type: object
                      properties:
                        distM:
                          type: number
                          description: Cumulative distance along the route in metres.
                        eleM:
                          type: number
                          description: Elevation in metres above sea level.
                  ascentM:
                    type: number
                    nullable: true
                    description: >
                      Total climb in metres (GraphHopper only); null for OSRM/fallback.
                  descentM:
                    type: number
                    nullable: true
                    description: >
                      Total descent in metres (GraphHopper only); null for OSRM/fallback.
                  surfaces:
                    type: array
                    nullable: true
                    description: >
                      OSM surface breakdown — distance per surface value, sorted
                      descending by distance (GraphHopper only); null for OSRM/fallback.
                    items:
                      type: object
                      properties:
                        surface:
                          type: string
                          description: OSM surface tag value (e.g. asphalt, gravel, ground).
                        distM:
                          type: number
                          description: Total distance on this surface in metres.
        "422":
          description: Missing/invalid points, or not between 2 and 25 waypoints.
        "429":
          description: Rate limit exceeded.

  /maps/resolve:
    get:
      tags: [Maps]
      operationId: mapsResolve
      summary: Resolve a Google-Maps short link to coordinates
      description: >
        Resolves a Google-Maps short link (maps.app.goo.gl / goo.gl / g.co) to
        the { lat, lng } it points at, for the Explore search box. Follows the
        redirect chain (max 6 hops) and extracts the coordinates from the final
        URL or page body. User-initiated, opt-in egress (same class as
        /gallery/geocode): the short link is the only thing sent outbound, and
        only to Google hosts (allow-list re-checked on every hop); a redirect off
        Google is refused. Every hop is SSRF-guarded (link-local/metadata refused,
        IP pinned against DNS-rebinding, redirects walked manually). The link and
        resolved coordinates are never logged or persisted. On any failure
        (non-Google host, no coordinates, unreachable) a clean 200 with
        lat:null,lng:null is returned. Throttle 30 req/min.
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
            maxLength: 2048
          description: The Google-Maps short link to resolve.
      responses:
        "200":
          description: Coordinates, or lat:null,lng:null when the link cannot be resolved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  lat:
                    type: number
                    nullable: true
                    description: Latitude, or null when unresolved.
                  lng:
                    type: number
                    nullable: true
                    description: Longitude, or null when unresolved.
        "422":
          description: Missing or invalid url.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Passwords (enrichment endpoints)
  # --------------------------------------------------------------------------

  /passwords/icon:
    get:
      tags: [Passwords]
      operationId: passwordsIcon
      summary: Fetch favicon/BIMI for a domain
      description: >
        Returns a data URI (base64-encoded image) for the best available icon for
        the given domain (favicon → BIMI). The fetch goes through the server's SSRF
        guard; the result is returned as a data URI. The domain is not persisted.
        Throttle: 1200 req/min.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
          description: Domain to look up (e.g. "github.com").
      responses:
        "200":
          description: Icon data URI or null.
          content:
            application/json:
              schema:
                type: object
                properties:
                  icon:
                    type: string
                    nullable: true
                    description: Data URI (e.g. "data:image/png;base64,...") or null if none found.
        "429":
          description: Rate limit exceeded.

  /passwords/breach:
    get:
      tags: [Passwords]
      operationId: passwordsBreach
      summary: HIBP k-anonymity breach check
      description: >
        Proxies a Have I Been Pwned range query. The client sends only the first 5
        hex characters of the SHA-1 hash of the password; the server forwards the
        query to HIBP and returns the matching suffix/count lines. The full hash
        never leaves the client. SHA-1 is used here solely because HIBP requires
        it for the k-anonymity protocol. Throttle: 300 req/min.
      parameters:
        - name: prefix
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9A-Fa-f]{5}$"
          description: First 5 hex chars of the SHA-1 hash (uppercase preferred).
      responses:
        "200":
          description: "HIBP range response (suffix:count lines)."
          content:
            text/plain:
              schema:
                type: string
                description: HIBP range response text forwarded verbatim.
        "429":
          description: Rate limit exceeded.

  /passwords/tfa-directory:
    get:
      tags: [Passwords]
      operationId: passwordsTfaDirectory
      summary: 2FA support directory
      description: >
        Returns the server-cached 2fa.directory dataset wrapped in an `entries` key.
        The value is a domain → documentation URL map. Used by the client to show a
        "this site supports 2FA" hint on login entries. Server caches the dataset for
        24 hours. Throttle: 120 req/min.
      responses:
        "200":
          description: Domain to 2FA documentation URL map, wrapped in an entries object.
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: object
                    description: >
                      Map of domain → documentation URL (http/https only, empty string
                      when no doc URL is known). Keys are lower-cased domain names.
                    additionalProperties:
                      type: string
                      description: Documentation URL (http/https only) or empty string.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Vaults (shared password vault management)
  # --------------------------------------------------------------------------

  /vaults/keys:
    get:
      tags: [Vaults]
      operationId: vaultKeysShow
      summary: Retrieve the caller's X25519 identity key material
      description: >
        Returns the caller's published X25519 public key, the wrapped secret key
        (sealed under VK), and the fingerprint. Allows the client to recover the
        secret key on a second device. Returns null fields if no key has been
        published. Throttle: 60 req/min.
      responses:
        "200":
          description: Identity key material.
          content:
            application/json:
              schema:
                type: object
                properties:
                  public_key:
                    type: string
                    nullable: true
                    description: X25519 public key (base64). Not secret.
                  wrapped_secret_key:
                    type: string
                    nullable: true
                    description: >
                      X25519 secret key wrapped under the caller's VK. Opaque ciphertext;
                      the server never reads it.
                  fingerprint:
                    type: string
                    nullable: true
                    description: BLAKE2b-16 hex fingerprint of the public key.
                  mlkem_public_key:
                    type: string
                    nullable: true
                    description: >
                      Store v3 (§6.3): ML-KEM-768 (FIPS 203) encapsulation key
                      (base64). Not secret. Published alongside the X25519 key so
                      cross-user wraps are post-quantum hybrid.
                  wrapped_mlkem_secret_key:
                    type: string
                    nullable: true
                    description: >
                      ML-KEM-768 identity secret sealed under the caller's VK. By
                      convention this is the 64-byte FIPS-203 SEED (not the expanded
                      decapsulation key) — the portable canonical secret from which
                      every client (noble keygen(seed) / CryptoKit
                      seedRepresentation) reproduces the identical keypair. Opaque
                      ciphertext; the server never reads it.
        "429":
          description: Rate limit exceeded.

    put:
      tags: [Vaults]
      operationId: vaultKeysStore
      summary: Publish the caller's X25519 identity keypair
      description: >
        Write-once: publishes the X25519 public key, wrapped secret key, and
        fingerprint. A re-publish of the same public key is idempotent. Attempting
        to change the public key returns 409 (would orphan existing vault
        invitations). Throttle: 30 requests/minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, wrapped_secret_key, fingerprint, mlkem_public_key, wrapped_mlkem_secret_key]
              properties:
                public_key:
                  type: string
                  description: X25519 public key (base64).
                wrapped_secret_key:
                  type: string
                  description: >
                    X25519 secret key sealed under the caller's VK. Opaque to the server.
                fingerprint:
                  type: string
                  description: BLAKE2b-16 hex fingerprint of the public key.
                mlkem_public_key:
                  type: string
                  description: >
                    Store v3 (§6.3): ML-KEM-768 (FIPS 203) encapsulation key (base64).
                    Required from v3 clients; published with the X25519 key.
                wrapped_mlkem_secret_key:
                  type: string
                  description: ML-KEM-768 decapsulation key sealed under the caller's VK. Opaque.
      responses:
        "200":
          description: Published (or idempotent re-publish).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "409":
          description: Different public key already stored (key conflict).

  /vaults:
    get:
      tags: [Vaults]
      operationId: vaultsIndex
      summary: List the caller's shared vault memberships
      description: >
        Returns all vault memberships (all statuses: pending/active/revoked) for
        the authenticated user, including the per-vault wrapped_vault_key so the
        client can unlock each invited vault. Each row carries `kind`
        (password|folder) and `owner` (true when the caller created the vault, not
        just an invited manager). No throttle beyond default.


        Converting a folder between private and shared is a CLIENT-COMPOSED flow —
        there is no dedicated server endpoint (zero-knowledge: the server cannot
        re-encrypt). Private → shared: create a vault (POST /vaults kind=folder),
        for each file re-wrap its per-file key under the new folder key and
        re-upload the unchanged ciphertext via POST /vaults/{vault}/blobs/upload,
        PUT /vaults/{vault}/store, then drop the files from the personal files index
        (PUT /files/store). Shared → private (owner only): the reverse — fetch each
        blob via GET /vaults/{vault}/blobs/raw/{blob}, re-wrap under the personal
        vault key, re-upload via POST /files/upload, add to PUT /files/store, then
        DELETE /vaults/{vault} (revokes all members + frees the shared blobs).
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [password, folder]
          description: Filter by vault kind. Omit to return all kinds.
      responses:
        "200":
          description: List of vault membership objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    vault_id:
                      type: string
                    role:
                      type: string
                      enum: [viewer, editor, manager]
                    status:
                      type: string
                      enum: [pending, active, revoked]
                    kind:
                      type: string
                      enum: [password, folder]
                      description: Vault kind (password vault or shared folder).
                    owner:
                      type: boolean
                      description: >
                        True when the caller owns this vault (created it), not just an
                        invited manager. Gates owner-only actions such as converting a
                        shared folder back to a private folder.
                    wrapped_vault_key:
                      type: string
                      description: >
                        VK_vault wrapped under the member's X25519 public key.
                        Opaque ciphertext; the server never reads VK_vault.
                    vault:
                      type: object
                      description: Vault metadata (id, kind, owner_id).

    post:
      tags: [Vaults]
      operationId: vaultsStore
      summary: Create a new shared vault
      description: >
        Creates a shared vault, an empty sealed manifest store, and an active
        manager membership for the caller in a single transaction. The
        `wrapped_vault_key` is the caller's own VK_vault wrapped under their
        X25519 public key — opaque to the server. `kind` defaults to `password`.
        No throttle beyond default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wrapped_vault_key]
              properties:
                wrapped_vault_key:
                  type: string
                  description: >
                    VK_vault sealed under the owner's X25519 public key. Opaque
                    ciphertext; the server never reads VK_vault.
                kind:
                  type: string
                  enum: [password, folder]
                  default: password
                  description: Vault kind. Defaults to `password` for backward compatibility.
      responses:
        "201":
          description: Vault created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "422":
          description: Validation error.

  /vaults/{vault}:
    delete:
      tags: [Vaults]
      operationId: vaultsDestroy
      summary: Delete a shared vault
      description: >
        Permanently deletes the vault, cascading to its sealed store and all
        membership rows. Manager-gated. Throttle: 30 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Vault deleted. No response body.
        "404":
          description: Vault not found or caller is not a manager.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/store:
    get:
      tags: [Vaults]
      operationId: vaultsStoreShow
      summary: Read the shared vault's sealed manifest
      description: >
        Returns the sealed manifest and version for the shared vault. Requires
        viewer+ membership. Cache-Control: no-store. No per-route throttle.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sealed vault manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedStoreResponse"
        "404":
          description: Vault not found or not a member.

    put:
      tags: [Vaults]
      operationId: vaultsStoreSave
      summary: Write the shared vault's sealed manifest
      description: >
        Saves the sealed vault manifest with optimistic concurrency. On conflict
        the server returns 409 with the current version and sealed_manifest so the
        client can re-read and re-apply. Requires editor+ membership.
        Throttle: 600 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sealed_manifest, expected_version]
              properties:
                sealed_manifest:
                  type: string
                  description: >
                    Updated opaque sealed manifest encrypted under VK_vault.
                    The server stores this without reading it.
                expected_version:
                  type: integer
                  minimum: 0
                  description: Version the client last read (optimistic concurrency token).
      responses:
        "200":
          description: Write successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "409":
          description: Concurrent write conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"
        "404":
          description: Vault not found or insufficient role.
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/resolve-recipient:
    post:
      tags: [Vaults]
      operationId: vaultsResolveRecipient
      summary: Look up a user's X25519 public key for vault invitation
      description: >
        Manager-gated. Returns the X25519 public key and fingerprint of the
        prospective invitee so the manager can wrap VK_vault for them. Returns a
        uniform 422 for both "user not found" and "user has no key" to prevent
        user enumeration. Throttle: named `pubkey-lookup` (30 req/min per user).
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier:
                  type: string
                  description: Email address or username of the user to invite.
      responses:
        "200":
          description: Recipient's public key data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                  public_key:
                    type: string
                    description: X25519 public key (base64). Safe to send to the manager.
                  fingerprint:
                    type: string
                    description: BLAKE2b-16 hex fingerprint for TOFU verification.
                  mlkem_public_key:
                    type: string
                    description: >
                      Store v3 (§6.3): recipient's ML-KEM-768 encapsulation key (base64),
                      needed to build the hybrid wrap. A recipient without ML-KEM material
                      resolves as "no key" (422).
        "404":
          description: Vault not found or caller is not a manager.
        "422":
          description: >
            User not found, or user has no full identity key published (both X25519
            and ML-KEM required; uniform response for enumeration resistance).
        "429":
          description: Rate limit exceeded.

  /vaults/{vault}/members:
    get:
      tags: [Vaults]
      operationId: vaultsMembersIndex
      summary: List vault members
      description: >
        Returns all members with their role, status, and X25519 public key.
        Manager-gated. The wrapped_vault_key is intentionally excluded (per-recipient
        ciphertext that only the inviting client needs). Throttle: 60 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of members.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    user_id:
                      type: integer
                    name:
                      type: string
                      nullable: true
                    email:
                      type: string
                      nullable: true
                    role:
                      type: string
                      enum: [viewer, editor, manager]
                    status:
                      type: string
                      enum: [pending, active, revoked]
                    recipient_fingerprint:
                      type: string
                      nullable: true
                    public_key:
                      type: string
                      nullable: true
        "404":
          description: Vault not found or caller is not a manager.
        "429":
          description: Rate limit exceeded.

    post:
      tags: [Vaults]
      operationId: vaultsMembersStore
      summary: Invite a user to the vault
      description: >
        Creates a pending membership. The `wrapped_vault_key` is VK_vault sealed
        with `crypto_box_seal` to the recipient's X25519 public key — opaque to
        the server. Manager-gated. Throttle: 30 requests/minute.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, role, wrapped_vault_key]
              properties:
                user_id:
                  type: integer
                  description: ID of the user to invite.
                role:
                  type: string
                  enum: [viewer, editor, manager]
                  description: Role to assign. Cannot exceed the inviting manager's own role.
                wrapped_vault_key:
                  type: string
                  description: >
                    VK_vault sealed with crypto_box_seal to the recipient's X25519
                    public key. Opaque ciphertext; the server never reads VK_vault.
                recipient_fingerprint:
                  type: string
                  nullable: true
                  description: TOFU fingerprint of the recipient's public key for audit.
      responses:
        "201":
          description: Membership created (pending).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Vault not found or caller is not a manager.
        "422":
          description: Validation error.

  /vaults/{vault}/members/{member}/accept:
    post:
      tags: [Vaults]
      operationId: vaultsMembersAccept
      summary: Accept a vault invitation
      description: >
        Transitions the caller's own pending membership to active. Only the invited
        user may accept their own invitation. Throttle: 30 requests/minute.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: member
          in: path
          required: true
          schema:
            type: string
          description: Member row ID.
      responses:
        "200":
          description: Membership activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Membership not found or does not belong to the caller.
        "422":
          description: Membership is not in pending status.

  /vaults/{vault}/members/{member}:
    patch:
      tags: [Vaults]
      operationId: vaultsMembersUpdate
      summary: Update a member's role
      description: >
        Changes the role of an existing active member. Manager-gated; a manager
        cannot change their own role. Throttle: 30 requests/minute.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: member
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [viewer, editor, manager]
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Vault or member not found, or insufficient permissions.
        "422":
          description: Cannot change own role or invalid role.

    delete:
      tags: [Vaults]
      operationId: vaultsMembersDestroy
      summary: Remove a member from the vault (triggers key rotation)
      description: >
        Removes a member. Manager-gated. The client must immediately follow this
        call with POST /vaults/{vault}/rotate to cryptographically revoke access
        (re-key the vault for remaining members). No per-route throttle.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: member
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Vault or member not found, or caller is not a manager.

  /vaults/{vault}/rotate:
    post:
      tags: [Vaults]
      operationId: vaultsRotate
      summary: Re-key the vault (rotate VK_vault after member removal)
      description: >
        Atomically replaces the sealed manifest, bumps the version, and re-wraps
        VK_vault for all remaining active members in a single DB transaction with
        optimistic concurrency. This is the cryptographic revocation step that must
        follow member removal. On version conflict the server returns 409 so the
        client can re-read the current state and retry. Throttle: 30 req/min.
      parameters:
        - name: vault
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sealed_manifest, expected_version, members, remove_member_id]
              properties:
                sealed_manifest:
                  type: string
                  description: >
                    Re-sealed manifest encrypted under the fresh VK_vault. Opaque
                    ciphertext; the server never reads it.
                expected_version:
                  type: integer
                  minimum: 0
                  description: Current version to guard against concurrent writes.
                remove_member_id:
                  type: integer
                  description: >
                    ID of the SharedVaultMember row to remove. Must belong to this
                    vault. The caller (manager) cannot remove themselves.
                members:
                  type: array
                  description: >
                    Updated wrapped_vault_key for each REMAINING active member
                    (the removed member must NOT appear here), each sealed with
                    crypto_box_seal to their X25519 public key.
                  items:
                    type: object
                    required: [user_id, wrapped_vault_key]
                    properties:
                      user_id:
                        type: integer
                        description: User ID of the remaining member.
                      wrapped_vault_key:
                        type: string
                        description: >
                          Fresh VK_vault wrapped under the member's X25519 public key.
                          Opaque ciphertext.
      responses:
        "200":
          description: Rotation complete; new version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "409":
          description: Version conflict; re-read current state and retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"
        "404":
          description: Vault not found or caller is not a manager.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Devices
  # --------------------------------------------------------------------------

  /devices:
    get:
      tags: [Devices]
      operationId: devicesIndex
      summary: List the caller's connected devices
      description: >
        Returns all Sanctum tokens (connected devices) for the authenticated user,
        newest first. Includes live sync state, last-used time, and whether a remote
        wipe has been requested. No per-route throttle beyond default.
      responses:
        "200":
          description: List of connected devices.
          content:
            application/json:
              schema:
                type: object
                required: [devices]
                properties:
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Sanctum token ID.
                        current:
                          type: boolean
                          description: >
                            True for the token making this request, so a client can
                            refuse to revoke or wipe itself. Always false for
                            session-auth (web) callers.
                        name:
                          type: string
                          description: Human-readable device name.
                        meta:
                          type: string
                          description: >
                            Formatted string combining IP address and last-used time
                            (e.g. "192.168.1.1 · last used 3 hours ago").
                        syncing:
                          type: boolean
                          description: >
                            True when the device reported syncing state within the last
                            3 minutes.
                        syncDetail:
                          type: string
                          nullable: true
                          description: Short detail string from the last heartbeat (syncing only).
                        syncSeen:
                          type: string
                          nullable: true
                          description: Human-readable time since the last heartbeat was received.
                        wipeRequested:
                          type: boolean
                          description: True when the owner has flagged this device for remote wipe.
        "401":
          description: Unauthenticated.

  /devices/{token}:
    delete:
      tags: [Devices]
      operationId: devicesRevoke
      summary: Revoke a paired device
      description: >
        Deletes the Sanctum token for the given device, immediately revoking its
        access. Owner-scoped (can only revoke own tokens). Throttle: 20 req/min.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Sanctum token ID of the device to revoke.
      responses:
        "200":
          description: Device revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthenticated.
        "429":
          description: Rate limit exceeded.

  /devices/{token}/wipe:
    post:
      tags: [Devices]
      operationId: devicesWipe
      summary: Request a remote wipe for a device
      description: >
        Flags the device's Sanctum token with a wipe request. The token remains
        valid so the device can fetch the flag on its next heartbeat and self-erase.
        Owner-scoped. Throttle: 20 req/min.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Sanctum token ID of the device to wipe.
      responses:
        "200":
          description: Wipe flag set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthenticated.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Notifications
  # --------------------------------------------------------------------------

  /notifications:
    get:
      tags: [Notifications]
      operationId: notificationsIndex
      summary: List recent notifications
      description: >
        Returns up to 30 recent in-app notifications for the authenticated user,
        with an unread count. Supports ETag-based conditional requests — if the
        client sends If-None-Match matching the current ETag the server returns
        304 Not Modified with no body, skipping the row fetch entirely.
        No per-route throttle beyond default.
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag value from a previous response. Returns 304 if unchanged.
      responses:
        "200":
          description: Notification list with unread count.
          headers:
            ETag:
              description: >
                Opaque change-signature derived from the newest id, total count,
                latest update time, and unread count. Send back as If-None-Match.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [unread, items]
                properties:
                  unread:
                    type: integer
                    description: Count of unread notifications.
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        level:
                          type: string
                          description: Severity level (e.g. info, warning, error).
                        category:
                          type: string
                          nullable: true
                        title:
                          type: string
                        body:
                          type: string
                          nullable: true
                        read:
                          type: boolean
                        at:
                          type: string
                          format: date-time
                          nullable: true
        "304":
          description: Not Modified — ETag matched, no payload.
        "401":
          description: Unauthenticated.

  /notifications/{notification}/read:
    post:
      tags: [Notifications]
      operationId: notificationsMarkRead
      summary: Mark a single notification as read
      description: >
        Sets read_at to now for the given notification. Owner-scoped (403 if the
        notification belongs to another user). No per-route throttle.
      parameters:
        - name: notification
          in: path
          required: true
          schema:
            type: integer
          description: Notification ID.
      responses:
        "200":
          description: Marked as read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "403":
          description: Notification does not belong to the caller.
        "404":
          description: Notification not found.

  /notifications/read-all:
    post:
      tags: [Notifications]
      operationId: notificationsMarkAllRead
      summary: Mark all notifications as read
      description: >
        Sets read_at to now on all unread notifications for the authenticated
        user. Idempotent. No per-route throttle.
      responses:
        "200":
          description: All notifications marked as read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthenticated.

  # --------------------------------------------------------------------------
  # Gallery (additional: geocode + share management)
  # --------------------------------------------------------------------------

  /gallery/geocode:
    get:
      tags: [Gallery]
      operationId: galleryGeocode
      summary: Forward-geocode a place query to coordinates
      description: >
        Looks up candidate coordinates for a free-text place query using Nominatim.
        The query passes through the server only (client CSP forbids third-party
        calls) and is not persisted. Returns up to 6 results. Throttle: 60 req/min.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            maxLength: 256
          description: Free-text place query (e.g. "Berlin, Germany").
      responses:
        "200":
          description: Geocoding results.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        display:
                          type: string
                          description: Human-readable place name.
                        lat:
                          type: number
                          description: Latitude in decimal degrees.
                        lng:
                          type: number
                          description: Longitude in decimal degrees.
        "422":
          description: Missing or invalid query parameter.
        "429":
          description: Rate limit exceeded.

  /gallery/shares:
    post:
      tags: [Gallery]
      operationId: gallerySharesStore
      summary: Create a public share link for a gallery album
      description: >
        Creates a public gallery-album share link. The sealed_manifest is an
        opaque ciphertext blob containing the re-wrapped per-blob keys encrypted
        under the share link's fragment key — the server never reads it.
        Throttle: 60 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sealed_manifest, blob_refs]
              properties:
                sealed_manifest:
                  type: string
                  description: >
                    Opaque sealed share manifest (per-blob keys re-wrapped under the
                    share fragment key). The server stores this without reading it.
                blob_refs:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: UUIDs of gallery blobs included in the share.
                allow_download:
                  type: boolean
                  default: false
                  description: Whether recipients may download the raw blobs.
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional expiry timestamp. Null = no expiry.
                password:
                  type: string
                  minLength: 4
                  maxLength: 200
                  nullable: true
                  description: Optional password that recipients must enter to view the share.
      responses:
        "200":
          description: Share link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.

  /gallery/shares/{token}:
    put:
      tags: [Gallery]
      operationId: gallerySharesUpdate
      summary: Update an existing gallery share link
      description: >
        Replaces the sealed manifest, blob refs, and access settings of an existing
        gallery share. Owner-scoped. Throttle: 60 req/min.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Share link token returned by the create endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sealed_manifest, blob_refs]
              properties:
                sealed_manifest:
                  type: string
                  description: Updated opaque sealed share manifest.
                blob_refs:
                  type: array
                  items:
                    type: string
                    format: uuid
                allow_download:
                  type: boolean
                  default: false
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                password:
                  type: string
                  minLength: 4
                  maxLength: 200
                  nullable: true
                  description: New password (omit to keep existing; use clear_password to remove).
                clear_password:
                  type: boolean
                  default: false
                  description: If true, removes the current password protection.
      responses:
        "200":
          description: Share updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "404":
          description: Share not found or not owned by caller.
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.

    delete:
      tags: [Gallery]
      operationId: gallerySharesDestroy
      summary: Delete a gallery share link
      description: >
        Permanently removes the gallery share link. Owner-scoped. Throttle: 60 req/min.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Share link token.
      responses:
        "200":
          description: Share deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Share not found or not owned by caller.
        "429":
          description: Rate limit exceeded.

  # --------------------------------------------------------------------------
  # Account
  # --------------------------------------------------------------------------

  /account/export:
    get:
      tags: [Account]
      operationId: accountExport
      summary: GDPR data export (streamed zip)
      description: >
        Streams a zip file containing the user's data as JSON files (one per module:
        notes, todos, bookmarks, passwords meta, account info, etc.). Data only — no
        blob bytes. The zip is generated on the fly and not stored server-side.
        Throttle: 6 req/min.
      responses:
        "200":
          description: Zip archive streamed to the client.
          content:
            application/zip:
              schema:
                type: string
                format: binary
                description: >
                  ledgerline-export-{timestamp}.zip containing one JSON file per
                  data module.
        "401":
          description: Unauthenticated.
        "429":
          description: Rate limit exceeded.

  /account:
    delete:
      tags: [Account]
      operationId: accountDestroy
      summary: Permanently delete the account (GDPR erasure)
      description: >
        Permanently purges the account and all owned data (crypto-shred: vault key
        is discarded, all blobs deleted, all records deleted). The presented bearer
        token is revoked after deletion. Requires the user's email as a confirmation
        string to prevent accidental deletion. No per-route throttle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation:
                  type: string
                  description: >
                    Must equal the authenticated user's email address exactly.
                    Returns 422 on mismatch.
      responses:
        "200":
          description: Account deleted.
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
                    example: true
        "422":
          description: Confirmation string does not match the user's email.
        "401":
          description: Unauthenticated.

  /account/sessions/{id}:
    delete:
      tags: [Account]
      operationId: accountSessionsRevoke
      summary: Revoke another active web session
      description: >
        Deletes the given web session row for the authenticated user. Cannot revoke
        the caller's own current session. Idempotent (missing or already-deleted
        session is a no-op). No per-route throttle.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID to revoke.
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthenticated.

  # --------------------------------------------------------------------------
  # Preferences
  # --------------------------------------------------------------------------

  /profile/avatar/refresh:
    post:
      tags: [Preferences]
      operationId: profileAvatarRefresh
      summary: Re-download the avatar from Pocket-ID
      description: >
        Re-fetches the user's avatar from its stored Pocket-ID source URL and
        updates the server-side copy. Returns whether the refresh succeeded.
        Throttle: 6 req/min.
      responses:
        "200":
          description: Refresh attempted.
          content:
            application/json:
              schema:
                type: object
                required: [refreshed]
                properties:
                  refreshed:
                    type: boolean
                    description: True if the avatar was successfully re-downloaded.
        "401":
          description: Unauthenticated.
        "429":
          description: Rate limit exceeded.

  /locale:
    post:
      tags: [Preferences]
      operationId: localeUpdate
      summary: Update the UI language
      description: >
        Persists the chosen locale on the user's profile and (for web requests) in
        the session. The locale must be one of the values configured in
        config/locales.php. No per-route throttle beyond default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale:
                  type: string
                  description: BCP 47 locale code (e.g. "en", "de"). Must be in the supported list.
      responses:
        "200":
          description: Locale updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok, locale]
                properties:
                  ok:
                    type: boolean
                    example: true
                  locale:
                    type: string
                    description: The locale that was set.
        "422":
          description: Unsupported locale value.
        "401":
          description: Unauthenticated.

  /theme:
    post:
      tags: [Preferences]
      operationId: themeUpdate
      summary: Update the colour scheme preference
      description: >
        Persists the user's chosen colour scheme. No per-route throttle beyond default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [theme]
              properties:
                theme:
                  type: string
                  enum: [light, dark, system]
                  description: Colour scheme preference.
      responses:
        "200":
          description: Theme updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok, theme]
                properties:
                  ok:
                    type: boolean
                    example: true
                  theme:
                    type: string
                    enum: [light, dark, system]
        "422":
          description: Invalid theme value.
        "401":
          description: Unauthenticated.

  /contacts/notify:
    post:
      tags: [Contacts]
      operationId: contactsNotify
      summary: Relay a contact birthday or anniversary notification
      description: >
        The client (which holds the decrypted contacts data) detects a due
        birthday or anniversary and posts a ready-made notification message here.
        The server intersects the requested channels with the user's saved
        preferences for that kind and forwards to the enabled channels (desktop,
        ntfy, mail, webhook). The message is never stored. Throttle: 60 req/min.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, title, body]
              properties:
                kind:
                  type: string
                  enum: [birthday, anniversary]
                  description: Type of contact event.
                title:
                  type: string
                  maxLength: 200
                  description: Notification title.
                body:
                  type: string
                  maxLength: 500
                  description: Notification body text.
      responses:
        "200":
          description: Notification relayed (or skipped if no channels enabled).
          content:
            application/json:
              schema:
                type: object
                required: [sent]
                properties:
                  sent:
                    type: boolean
                    description: >
                      True if the message was dispatched to at least one channel.
                      False if the user has no channels enabled for this kind.
        "422":
          description: Validation error.
        "429":
          description: Rate limit exceeded.
