# WebDAV (/dav) must handle its own dotfiles. macOS Finder creates AppleDouble
# sidecars (._*), .DS_Store and .metadata_never_index probes, which the app's
# sabre TemporaryFileFilterPlugin manages. The generic dotfile deny in
# server-opts.d/security.conf ("location ~ /\.(?!well-known)") would 403 them,
# so Finder retries endlessly and copies/deletes crawl (~1 min for a few KB).
#
# This file is included before security.conf (00- sorts first), so nginx sees
# this regex location first and it wins for every /dav path — routing dotfiles
# to Laravel like any other request. Non-/dav dotfiles still hit the deny.
location ~ ^/dav(/|$) {
    try_files $uri $uri/ /index.php?$query_string;
}

# Vite emits some bundle assets as ES modules (.mjs) — e.g. the pdf.js worker.
# Stock nginx mime.types has no .mjs mapping, so it would fall back to
# application/octet-stream and the browser refuses to load it as a module
# worker (strict MIME checking), forcing a slow main-thread fallback. Serve
# .mjs as JavaScript. Long-cache: Vite fingerprints these filenames.
location ~* \.mjs$ {
    default_type text/javascript;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
