# Vite emits some bundle assets as ES modules (.mjs) — e.g. the pdf.js worker.
# Stock nginx mime.types has no .mjs mapping, so it would fall back to
# application/octet-stream and the browser refuses to load it as a module worker
# (strict MIME checking), forcing a slow main-thread fallback. Serve .mjs as
# JavaScript. Long-cache: Vite fingerprints these filenames.
location ~* \.mjs$ {
    default_type text/javascript;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
