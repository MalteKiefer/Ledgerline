<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Ledgerline</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
               background: #f3f4f6; color: #111827; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        main { text-align: center; padding: 2rem; }
        .badge { width: 64px; height: 64px; border-radius: 14px; margin: 0 auto 1rem; display: block; }
        h1 { font-size: 1.125rem; margin: 0 0 .5rem; }
        p { font-size: .875rem; color: #6b7280; margin: 0 0 1.25rem; }
        button { border: 0; border-radius: 8px; background: #111827; color: #fff; padding: .6rem 1.1rem;
                 font-size: .875rem; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <main>
        <img class="badge" src="/icon-192.png" alt="">
        <h1>Du bist offline</h1>
        <p>Ledgerline braucht eine Verbindung zum Server. / Ledgerline needs a connection to the server.</p>
        <button onclick="location.reload()">Erneut versuchen / Retry</button>
    </main>
</body>
</html>
