version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies"]
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies"]
  - package-ecosystem: npm
    directory: "/extension"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "extension"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["ci"]
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels: ["docker"]
