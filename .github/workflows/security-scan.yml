name: Security scan

# Dependency + filesystem vulnerability scanning and SBOM generation. Runs on
# pushes, PRs, and weekly so new CVEs against pinned versions surface promptly.
on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Composer audit
        run: composer audit --no-interaction

      - name: PHPStan (static analysis, blocking)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

      # Rector runs as a non-blocking dry-run report: it surfaces dead code /
      # code-quality suggestions without failing the build. Sensitive crypto /
      # blob / backup / sharing paths must be hand-reviewed before any apply, so
      # nothing is auto-applied in CI. See rector.php.
      - name: Rector (dry-run report, non-blocking)
        run: composer rector || true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: npm audit (runtime deps)
        run: |
          npm ci
          npm audit --omit=dev || true

      # CycloneDX SBOMs (one per build, uploaded as artifacts). Complements the
      # SPDX SBOM emitted by the trivy job. Composer plugin + npm tool pinned.
      - name: Generate SBOM (CycloneDX, Composer)
        if: always()
        run: composer CycloneDX:make-sbom --output-format=JSON --output-file=sbom.composer.cdx.json --spec-version=1.6

      - name: Generate SBOM (CycloneDX, npm)
        if: always()
        run: npx --yes @cyclonedx/cyclonedx-npm@6.0.0 --output-format JSON --output-file sbom.npm.cdx.json

      - name: Upload CycloneDX SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: |
            sbom.composer.cdx.json
            sbom.npm.cdx.json

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so a secret committed in any past commit is caught.
          fetch-depth: 0

      - name: gitleaks (secret scan, blocking)
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.28.0@sha256:cdbb7c955abce02001a9f6c9f602fb195b7fadc1e812065883f695d1eeaba854 \
            detect --source=/repo --redact --no-banner

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Trivy filesystem scan (lockfiles + IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif

      - name: Upload results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (SPDX)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
