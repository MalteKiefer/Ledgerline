<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: light dark; }
    body { width: 340px; margin: 0; font: 13px/1.4 system-ui, sans-serif; background: #fff; color: #111; }
    @media (prefers-color-scheme: dark) { body { background: #111827; color: #f3f4f6; } }
    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #0000001a; }
    header b { font-weight: 600; }
    header .links a { color: #6b7280; text-decoration: none; margin-left: 10px; cursor: pointer; font-size: 12px; }
    main { padding: 12px; }
    label { display: block; font-size: 11px; color: #6b7280; margin: 8px 0 3px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; background: transparent; color: inherit; font: inherit; }
    button.primary { width: 100%; margin-top: 12px; padding: 9px; border: 0; border-radius: 8px; background: #111827; color: #fff; font-weight: 600; cursor: pointer; }
    @media (prefers-color-scheme: dark) { button.primary { background: #f3f4f6; color: #111827; } input { border-color: #374151; } }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 8px; }
    .err { color: #dc2626; font-size: 12px; margin-top: 8px; }
    ul { list-style: none; margin: 8px 0 0; padding: 0; max-height: 320px; overflow-y: auto; }
    li button { display: flex; width: 100%; align-items: center; gap: 8px; padding: 8px; border: 0; background: transparent; color: inherit; text-align: left; cursor: pointer; border-radius: 8px; }
    li button:hover { background: #0000000d; }
    .av { width: 26px; height: 26px; border-radius: 6px; background: #e5e7eb; color: #374151; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex: none; }
    .t { font-weight: 500; } .u { font-size: 11px; color: #9ca3af; }
    .muted { color: #9ca3af; text-align: center; padding: 16px 0; font-size: 12px; }
  </style>
</head>
<body>
  <header><b>Ledgerline</b><span class="links" id="links"></span></header>
  <main id="app"></main>
  <script type="module" src="./popup.js"></script>
</body>
</html>
