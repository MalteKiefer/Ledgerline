<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { width: 600px; margin: 0; font: 13px/1.4 system-ui, sans-serif; background: #fff; color: #111827; overflow-x: hidden; }
    @media (prefers-color-scheme: dark) { body { background: #111827; color: #f3f4f6; } }
    svg { display: block; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid #0000001a; }
    header b { font-weight: 600; }
    @media (prefers-color-scheme: dark) { header { border-color: #ffffff14; } }
    .icons { display: flex; gap: 2px; }
    .ic { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border: 0; background: transparent; color: #6b7280; border-radius: 7px; cursor: pointer; }
    .ic:hover { background: #0000000d; color: #111827; }
    @media (prefers-color-scheme: dark) { .ic:hover { background: #ffffff14; color: #f3f4f6; } }

    main { padding: 12px; }

    /* pairing / unlock forms */
    label.fld { display: block; font-size: 11px; color: #6b7280; margin: 8px 0 3px; }
    input, select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; background: transparent; color: inherit; font: inherit; }
    @media (prefers-color-scheme: dark) { input, select { border-color: #374151; } }
    button.primary { width: 100%; margin-top: 12px; padding: 9px; border: 0; border-radius: 8px; background: #111827; color: #fff; font-weight: 600; cursor: pointer; }
    @media (prefers-color-scheme: dark) { button.primary { background: #f3f4f6; color: #111827; } }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 8px; }
    .err { color: #dc2626; font-size: 12px; margin-top: 8px; }

    /* master-detail */
    .cols { display: flex; height: 440px; }
    .list { width: 244px; flex: none; display: flex; flex-direction: column; border-right: 1px solid #0000001a; padding-right: 10px; }
    @media (prefers-color-scheme: dark) { .list { border-color: #ffffff14; } }
    .list .top { display: flex; flex-direction: column; gap: 6px; }
    .list .search { position: relative; }
    .list .search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
    .list .search input { padding-left: 30px; }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #0000000d; color: #6b7280; border: 0; cursor: pointer; }
    .chip.on { background: #111827; color: #fff; }
    @media (prefers-color-scheme: dark) { .chip.on { background: #f3f4f6; color: #111827; } }
    ul { list-style: none; margin: 8px 0 0; padding: 0; flex: 1; overflow-y: auto; overflow-x: hidden; }
    li button.row { display: flex; width: 100%; align-items: center; gap: 8px; padding: 7px 8px; border: 0; background: transparent; color: inherit; text-align: left; cursor: pointer; border-radius: 8px; }
    li button.row:hover { background: #0000000d; }
    li button.row.on { background: #11182710; }
    @media (prefers-color-scheme: dark) { li button.row.on { background: #ffffff1a; } }
    .av { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex: none; overflow: hidden; color: #fff; }
    .av img { width: 100%; height: 100%; object-fit: contain; }
    .av.mono { background: #e5e7eb; color: #374151; }
    @media (prefers-color-scheme: dark) { .av.mono { background: #374151; color: #e5e7eb; } }
    .grow { flex: 1; min-width: 0; }
    .t { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .u { font-size: 11px; color: #9ca3af; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .star { flex: none; color: #f59e0b; }
    .muted { color: #9ca3af; text-align: center; padding: 20px 8px; font-size: 12px; }

    /* detail pane */
    .detail { flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden; padding-left: 12px; }
    .dhead { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .dhead .av { width: 40px; height: 40px; border-radius: 9px; font-size: 15px; }
    .dactions { display: flex; gap: 2px; flex: none; }
    .dtitle { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dtype { font-size: 11px; color: #9ca3af; }
    .tfahint { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; padding: 9px 11px; border-radius: 9px; background: #eff6ff; color: #1e40af; font-size: 12px; line-height: 1.35; }
    .tfahint svg { flex: none; margin-top: 1px; }
    @media (prefers-color-scheme: dark) { .tfahint { background: #1e3a8a33; color: #93c5fd; } }
    .field { border: 1px solid #0000001a; border-radius: 9px; padding: 8px 10px; margin-bottom: 8px; }
    @media (prefers-color-scheme: dark) { .field { border-color: #ffffff14; } }
    .field .flabel { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: #2563eb; font-weight: 600; }
    @media (prefers-color-scheme: dark) { .field .flabel { color: #60a5fa; } }
    .field .frow { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .field .fval { flex: 1; min-width: 0; word-break: break-all; }
    .field .fval.mono { font-family: ui-monospace, SFMono-Regular, monospace; }
    .field a.fval { color: inherit; text-decoration: underline; }
    .totp .code { font-family: ui-monospace, monospace; font-size: 20px; font-weight: 600; letter-spacing: .08em; }
    .totp .remain { font-size: 12px; color: #9ca3af; font-variant-numeric: tabular-nums; }
    .dtags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .dtags .tg { font-size: 11px; color: #6b7280; background: #0000000d; border-radius: 999px; padding: 2px 8px; }
    .fillbtn { width: 100%; margin-top: 4px; padding: 9px; border: 0; border-radius: 8px; background: #111827; color: #fff; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    @media (prefers-color-scheme: dark) { .fillbtn { background: #f3f4f6; color: #111827; } }
    .empty { display: flex; height: 100%; align-items: center; justify-content: center; color: #9ca3af; font-size: 12px; text-align: center; padding: 0 16px; }

    /* generator */
    .prev { display: flex; align-items: center; gap: 4px; padding: 10px; border: 1px solid #0000001a; border-radius: 9px; background: #0000000a; }
    .prev .grow { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 13px; word-break: break-all; }
    @media (prefers-color-scheme: dark) { .prev { border-color: #ffffff14; } }
    .seg { display: flex; background: #0000000d; border-radius: 8px; padding: 2px; margin-top: 12px; }
    .seg button { flex: 1; border: 0; background: transparent; padding: 7px; border-radius: 6px; font: inherit; cursor: pointer; color: #6b7280; }
    .seg button.on { background: #fff; color: #111827; font-weight: 600; }
    @media (prefers-color-scheme: dark) { .seg button.on { background: #374151; color: #f3f4f6; } }
    .rng { display: block; font-size: 11px; color: #6b7280; margin-top: 12px; }
    .opts { display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 10px; font-size: 13px; }
    .opts label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
    .opts input[type=checkbox] { width: auto; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .grid2 label { font-size: 11px; color: #6b7280; }
    .grid2 select { margin-top: 3px; }
  </style>
</head>
<body>
  <header><b>Ledgerline</b><span class="icons" id="links"></span></header>
  <main id="app"></main>
  <script type="module" src="./popup.js"></script>
</body>
</html>
