# Ledgerline — self-hosted stack. App in Docker; TLS + routing via Caddy on the
# host (reverse_proxy to 127.0.0.1:${APP_PORT}). See docker/caddy/ledgerline.caddy.
#
#   cp .env.docker.example .env   # then fill APP_KEY, passwords, DOMAIN
#   docker compose build
#   docker compose up -d
#
# Rolling release: scripts/deploy.sh <version>.

x-app-image: &app-image
  image: ledgerline:${IMAGE_TAG:-local}
  build:
    context: .
    # Build on the host network: this host's Docker daemon has no external DNS
    # for bridge-network build containers (its resolver lives on a netbird
    # overlay reachable only in the host netns), so apt/composer/npm fetches
    # fail otherwise. Host-net build uses the host's working resolver.
    network: host
    args:
      # Keep this digest in lockstep with the ARG PHP_BASE default in Dockerfile —
      # this build arg overrides that default, so a PHP bump must change BOTH.
      PHP_BASE: serversideup/php:8.5-fpm-nginx-alpine@sha256:1854d81da23fc5c174a26bf039bc7724aeccec5743524717bbc6c10c1c927ac2
  env_file: .env
  environment:
    # This host has no route to the EC2 instance-metadata IP (169.254.169.254),
    # which is black-holed rather than refused. Without this, the AWS SDK's
    # credential provider probes IMDS on every S3 call and blocks until timeout,
    # hanging photo processing (renditions/metadata) for minutes. We always pass
    # explicit S3 keys, so IMDS is never needed — disable the probe outright.
    AWS_EC2_METADATA_DISABLED: "true"
    # Let nginx accept large uploads (the base image defaults to 100M, which
    # rejects big files with an HTTP/2 stream error). Keep in sync with the PHP
    # post/upload limits and Caddy's request_body max_size.
    NGINX_CLIENT_MAX_BODY_SIZE: "560M"
  restart: unless-stopped
  # NOTE: a fully read-only root filesystem is NOT used — the serversideup base
  # renders /etc/nginx/nginx.conf from a template at boot (entrypoint
  # 10-init-webserver-config.sh), which fails on a read-only /etc; S6_READ_ONLY_
  # ROOT only redirects s6's own /run state, not that write. The container is
  # already hardened via non-root (www-data), cap_drop:[ALL] and no-new-privileges.
  security_opt:
    - no-new-privileges:true
  # Drop ALL Linux capabilities, then add back only what the serversideup base
  # needs to su-exec from root down to www-data and fix file ownership. Verified
  # to boot cleanly; blocks NET_RAW (ARP spoofing) and every other unused cap.
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETUID
    - SETGID
    - DAC_OVERRIDE
    - FOWNER
    - KILL
  depends_on:
    db:
      condition: service_healthy
    valkey:
      condition: service_healthy
  networks:
    - internal
  volumes:
    - app-storage:/var/www/html/storage/app
    # The /gallery/process transform decrypts each original to the system temp
    # dir before deriving renditions and unlinking it. Back that dir with a
    # size-capped tmpfs so the plaintext lives only in RAM and never lands on the
    # container's writable layer (crash/backup/forensic recovery of ZK content).
    - type: tmpfs
      target: /tmp
      tmpfs:
        size: 2147483648

services:
  app:
    <<: *app-image
    # Only this service runs migrations + optimize on start (isolated lock
    # prevents races); worker/scheduler skip it.
    environment:
      # Repeated from the x-app-image anchor: an explicit `environment:` here
      # overrides (not merges with) the anchor's, so the IMDS opt-out must be
      # restated or the web app would lose it and hang on S3 access.
      AWS_EC2_METADATA_DISABLED: "true"
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      AUTORUN_LARAVEL_ROUTE_CACHE: "true"
      AUTORUN_LARAVEL_VIEW_CACHE: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "true"
    ports:
      - "127.0.0.1:${APP_PORT:-8300}:8080"
    deploy:
      resources:
        limits:
          # Hard ceiling for the web app (nginx + php-fpm children).
          memory: ${APP_MEMORY_LIMIT:-8g}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Queue workers. Scale up to 10 processes:  docker compose up -d --scale worker=10
  # Each replica is capped at WORKER_MEMORY_LIMIT (default 768m) so 10 workers
  # stay within ~7.5g. queue:work also self-restarts past its own memory bound.
  worker:
    <<: *app-image
    command: ["php", "/var/www/html/artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600", "--timeout=600", "--memory=${WORKER_PHP_MEMORY:-512}"]
    deploy:
      # replicas is only applied when you don't pass --scale; keep 1 by default.
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          memory: ${WORKER_MEMORY_LIMIT:-768m}
    healthcheck:
      test: ["CMD-SHELL", "grep -la queue:work /proc/*/cmdline >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  scheduler:
    <<: *app-image
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    deploy:
      resources:
        limits:
          cpus: "${SCHEDULER_CPU_LIMIT:-1}"
          memory: ${SCHEDULER_MEMORY_LIMIT:-512m}
    healthcheck:
      test: ["CMD-SHELL", "grep -la schedule:work /proc/*/cmdline >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    # pgvector image (Postgres 17 + the `vector` extension) for image-similarity
    # duplicate detection. Drop-in for postgres:17-alpine — same PG17 data dir.
    image: pgvector/pgvector:pg17@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ledgerline}
      POSTGRES_USER: ${DB_USERNAME:-ledgerline}
      # Password read from a Docker secret file, not a process-visible env var.
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ledgerline} -d ${DB_DATABASE:-ledgerline}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  valkey:
    image: valkey/valkey:8-alpine@sha256:cfe71288f087704b06be45e270afa7a2abbf820093d6b11a23762081f5ff321d
    # Build the config from the mounted secret at start so the password is never
    # on the command line (visible in `ps`/`docker inspect`) nor in an env var.
    command: ["sh", "-c", "printf 'requirepass %s\\ndir /data\\nappendonly yes\\n' \"$$(cat /run/secrets/redis_password)\" > /tmp/valkey.conf && exec valkey-server /tmp/valkey.conf"]
    secrets:
      - redis_password
    volumes:
      - valkey-data:/data
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # CHOWN + FOWNER so RDB/AOF rewrites can rename over data files left by a
      # prior (root-owned) run; without them the save fails with EPERM.
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Machine-learning sidecar for image recognition: object/scene tagging + smart
  # search (CLIP) and facial recognition — the same engine Immich uses. The app
  # reaches it over the internal network at http://ml:3003 (ML_URL). Models are
  # downloaded on first use into the ml-cache volume. Enable with:
  #   docker compose --profile ml up -d
  ml:
    # Plain digest-pinned (no ${VAR:-default} wrapper) so Dependabot's docker
    # ecosystem can parse and bump it like the other services; tag + digest move
    # together on every bump.
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.3@sha256:d76fe88b69282c09a97eac4f82dafa82cfd77bce274bc742591cde974f87dacb
    profiles: ["ml"]
    environment:
      MACHINE_LEARNING_WORKERS: "1"
      MACHINE_LEARNING_MODEL_TTL: "300"
    volumes:
      - ml-cache:/cache
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
    deploy:
      resources:
        limits:
          cpus: "${ML_CPU_LIMIT:-4}"
          memory: ${ML_MEMORY_LIMIT:-8g}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:3003/ping')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional self-hosted Photon reverse-geocoder, so photo coordinates for the
  # imported regions never leave the host. Enable with:
  #   docker compose --profile geocode up -d
  # then set PHOTON_URL=http://photon:2322 in .env (and, for automatic on-upload
  # geocoding, GALLERY_GEOCODE_ON_UPLOAD=true). PHOTON_REGION picks the coverage;
  # the default "germany" pulls a PREBUILT index (db mode: a light ~few-GB
  # download into photon-data, ~2 GB heap, no heavy build) to fit a modest box.
  # Points OUTSIDE the imported region
  # fall back to the public GEOCODER_URL (OSM) — the app queries Photon first and
  # Nominatim only on a miss. Reverse endpoint: /reverse (GeoJSON).
  photon:
    image: ghcr.io/rtuszik/photon-docker:2.3.0@sha256:827cedf9fa3337e657611d62ada669def75dff61c56b51ae55056155d1a9b236
    profiles: ["geocode"]
    environment:
      # db mode = prebuilt single-region index (light, ~2 GB heap, no build).
      # For wider coverage on a bigger box, set PHOTON_IMPORT_MODE=jsonl and
      # PHOTON_REGION to a comma list (e.g. europe,north-america).
      IMPORT_MODE: ${PHOTON_IMPORT_MODE:-db}
      REGION: ${PHOTON_REGION:-germany}
      UPDATE_STRATEGY: DISABLED
    volumes:
      - photon-data:/photon/data
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: "${PHOTON_CPU_LIMIT:-2}"
          memory: ${PHOTON_MEMORY_LIMIT:-4g}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:2322/status' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

networks:
  internal:

# Datastore passwords sourced from the existing .env vars but delivered to the
# containers as mounted secret FILES (/run/secrets/*), never as a process env
# var or on the command line — so they don't show in `docker inspect` env or
# `/proc/<pid>/environ`. No operator file management needed; the value still
# comes from DB_PASSWORD / REDIS_PASSWORD in .env.
secrets:
  db_password:
    environment: DB_PASSWORD
  redis_password:
    environment: REDIS_PASSWORD

volumes:
  pgdata:
  valkey-data:
  app-storage:
  ml-cache:
  photon-data:

